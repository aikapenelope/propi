<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Propi — Sin conexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #E4E7E1;
      color: #0A2B1D;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
    }
    .container { max-width: 22rem; }
    .icon {
      width: 4rem; height: 4rem; margin: 0 auto 1.5rem;
      border-radius: 1rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #3d5a4a; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #0A2B1D;
      color: #E4E7E1;
      border: none;
      border-radius: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { background: #163d2a; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/icons/icon-192.png" alt="Propi" class="icon">
    <h1>Sin conexion</h1>
    <p>No hay conexion a internet. Verifica tu red y vuelve a intentar.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
